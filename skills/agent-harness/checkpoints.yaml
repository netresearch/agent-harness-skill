version: 1
skill_id: agent-harness

preconditions:
  - type: command
    target: "git rev-parse --git-dir 2>/dev/null"
    desc: "Must be a git repository"

mechanical:
  # Level 1 — Basic
  - id: AH-01
    type: file_exists
    target: AGENTS.md
    severity: error
    desc: "AGENTS.md exists at repo root"

  - id: AH-02
    type: command
    target: "test $(wc -l < AGENTS.md) -lt 150"
    severity: warning
    desc: "AGENTS.md is compact index (<150 lines)"

  - id: AH-03
    type: regex
    target: AGENTS.md
    value: "(?i)## commands"
    severity: warning
    desc: "AGENTS.md documents available commands"

  - id: AH-04
    type: command
    target: "test -d docs"
    severity: warning
    desc: "docs/ directory exists"

  # Level 2 — Verified
  - id: AH-10
    type: command
    target: >-
      ! grep -oP '\\[.*?\\]\\(\\K[^)]+' AGENTS.md 2>/dev/null
      | grep -v '^http' | grep -v '^#' | sed 's/[?#].*//'
      | while read -r ref; do test -e "$ref" || { echo "Dead ref: $ref"; exit 1; }; done
    severity: error
    desc: "All AGENTS.md references resolve to existing files"

  - id: AH-11
    type: file_exists
    target: docs/ARCHITECTURE.md
    severity: warning
    desc: "Architecture documentation exists"

  - id: AH-12
    type: command
    target: "test -f .github/workflows/harness-verify.yml || (test -f .gitlab-ci.yml && grep -q 'harness-verify\\|verify-harness' .gitlab-ci.yml)"
    severity: warning
    desc: "CI harness verification workflow exists (GitHub Actions or GitLab CI)"

  # Level 3 — Enforced
  - id: AH-20
    type: command
    target: "test -f .github/pull_request_template.md || test -d .github/PULL_REQUEST_TEMPLATE || test -n \"$(find .gitlab/merge_request_templates -maxdepth 1 -name '*.md' -print -quit 2>/dev/null)\""
    severity: warning
    desc: "PR/MR template with harness checklist exists"

  - id: AH-21
    type: command
    target: "grep -qlr 'hooksPath\\|core.hookspath' .envrc .husky/husky.sh 2>/dev/null || grep -q 'post-install-cmd' composer.json 2>/dev/null"
    severity: warning
    desc: "Git hooks auto-activate on clone"

  # === QUALITY DELEGATION ENFORCEMENT ===
  # The harness delegates quality to specialist skills but MUST verify
  # the delegation produces results. These checks verify that quality
  # infrastructure exists and is properly configured.

  - id: AH-30
    type: file_exists
    target: "{Build/Scripts/runTests.sh,Makefile}"
    severity: warning
    desc: "Test runner infrastructure must exist (runTests.sh or Makefile with test targets)"

  - id: AH-31
    type: command
    command: "test -f Build/phpstan.neon && grep -cP 'level:\\s*(10|max|[89])' Build/phpstan.neon || echo 0"
    expected: "^[1-9]"
    severity: warning
    desc: "PHPStan must be configured at level 8+ (level 10 recommended)"

  - id: AH-32
    type: file_exists
    target: "{captainhook.json,.githooks/pre-commit}"
    severity: warning
    desc: "Git hooks must be configured for pre-commit quality checks"

  - id: AH-33
    type: command
    command: "find Tests/ -name '*Test.php' 2>/dev/null | wc -l"
    expected: "^[1-9]"
    severity: error
    desc: "Project must have at least one test file"

  - id: AH-34
    type: file_exists
    target: "{infection.json5,infection.json}"
    severity: info
    desc: "Mutation testing configuration should exist for mature projects"

  - id: AH-35
    type: file_exists
    target: codecov.yml
    severity: info
    desc: "Code coverage configuration should exist"
