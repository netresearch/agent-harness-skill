version: 1
skill_id: agent-harness

preconditions:
  - type: command
    target: "git rev-parse --git-dir 2>/dev/null"
    desc: "Must be a git repository"

mechanical:
  # Level 1 — Basic
  - id: AH-01
    type: file_exists
    target: AGENTS.md
    severity: error
    desc: "AGENTS.md exists at repo root"

  - id: AH-02
    type: command
    target: "test $(wc -l < AGENTS.md) -lt 150"
    severity: warning
    desc: "AGENTS.md is compact index (<150 lines)"

  - id: AH-03
    type: regex
    target: AGENTS.md
    value: "(?i)## commands"
    severity: warning
    desc: "AGENTS.md documents available commands"

  - id: AH-04
    type: command
    target: "test -d docs"
    severity: warning
    desc: "docs/ directory exists"

  # Level 2 — Verified
  - id: AH-10
    type: command
    target: "! grep -oP '\\[.*?\\]\\(\\K[^)]+' AGENTS.md 2>/dev/null | grep -v '^http' | grep -v '^#' | sed 's/#.*//' | while read -r ref; do test -e \"$ref\" || { echo \"Dead ref: $ref\"; exit 1; }; done"
    severity: error
    desc: "All AGENTS.md references resolve to existing files"

  - id: AH-11
    type: file_exists
    target: docs/ARCHITECTURE.md
    severity: warning
    desc: "Architecture documentation exists"

  - id: AH-12
    type: file_exists
    target: .github/workflows/harness-verify.yml
    severity: warning
    desc: "CI harness verification workflow exists"

  # Level 3 — Enforced
  - id: AH-20
    type: file_exists
    target: .github/pull_request_template.md
    severity: warning
    desc: "PR template with harness checklist exists"

  - id: AH-21
    type: command
    target: "grep -qlr 'hooksPath\\|core.hookspath' .envrc .husky/husky.sh 2>/dev/null || grep -q 'post-install-cmd' composer.json 2>/dev/null"
    severity: warning
    desc: "Git hooks auto-activate on clone"
